<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Cloud Generator</title>
    <link rel="stylesheet" href="WordCloud.css">
    <script src="WordCloud.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Word Cloud Generator</h1>
    </div>

    <div class="container" id="textInput">
        <textarea id="textInputArea" placeholder="Enter text here..."></textarea>
        <!-- Or allow users to upload a word doc.x or txt file-->
        <p>Or upload a text file or Word document:</p>
        <input type="file" id="fileInput" accept=".txt,.docx">
    </div>

    <div class="container" id="options">
        <h2>Customization Options</h2>

        <div class="option">
            <label for="textColorChoices">Text Color:</label>
            <select id="textColorChoices">
                <option value="black">Black</option>
                <option value="red">Red</option>
                <option value="blue">Blue</option>
                <option value="green">Green</option>
                <option value="purple">Purple</option>
                <option value="orange">Orange</option>
                <option value="gray">Gray</option>
                <option value="pink">Pink</option>
                <option value="brown">Brown</option>
                <option value="cyan">Cyan</option>
                <option value="magenta">Magenta</option>
                <option value="yellow">Yellow</option>
                <option value="white">White</option>
                <option value="rainbow">Rainbow</option>
            </select>
        </div>

        <div class="option">
            <label for="backgroundColorChoices">Solid Background Color:</label>
            <select id="backgroundColorChoices">
                <option value="white">White</option>
                <option value="black">Black</option>
                <option value="lightgray">Light Gray</option>
                <option value="lightblue">Light Blue</option>
                <option value="lightgreen">Light Green</option>
                <option value="lightyellow">Light Yellow</option>
                <option value="lightpink">Light Pink</option>
                <option value="lightcyan">Light Cyan</option>
                <option value="#ffb3ff">Light Magenta</option>
                <option value="#ffd9b3">Light Orange</option>
                <option value="#d9b3ff">Light Purple</option>
                <option value="#c4a882">Light Brown</option>
                <option value="#ffb3b3">Light Red</option>
            </select>
        </div>

        <div class="option">
            <label>Gradient Background:</label>
            <input type="color" id="gradientColor1" value="#ffffff">
            <span>to</span>
            <input type="color" id="gradientColor2" value="#add8e6">
            <select id="gradientDirection">
            <option value="to right">→ Horizontal</option>
            <option value="to bottom">↓ Vertical</option>
            <option value="to bottom right">↘ Diagonal</option>
        </select>
        <button id="applyGradient">Use Gradient</button>
</div>

        <div class="option">
            <label for="fontStyle">Font Style:</label>
            <select id="fontStyle">
                <option value="Arial">Arial</option>
                <option value="Times New Roman">Times New Roman</option>
                <option value="Comic Sans MS">Comic Sans MS</option>
                <option value="Impact">Impact</option>
            </select>
        </div>

        <div class="option">
            <label for="maxWords">Max Words:</label>
            <input type="number" id="maxWords" min="10" max="200" value="100">
        </div>
        
            <button id="generateButton">Generate Word Cloud</button>

    </div>


    <div class="container" id="wordCloudContainer">
        <div class="word-cloud" id="wordCloud">
            <!-- Display word cloud generated by WordCloud.js -->
        </div>
    </div>

</body>
</html>
